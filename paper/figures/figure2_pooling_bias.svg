  <g font-family="Helvetica, Arial, sans-serif">
    <text x="240" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#2ca6a4">diffuse compositional signal</text>
    <text x="640" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#e8763a">localized machinery signal</text>
    <text x="240" y="365" text-anchor="middle" font-size="11" fill="#888">mean-pool prior: many weak contributors</text>
    <text x="640" y="365" text-anchor="middle" font-size="11" fill="#888">attention prior: few decisive genes</text>
  </g>

  <g fill="#2ca6a4" opacity="0.82">
    <rect x="114" y="205" width="18" height="115" rx="1"/>
    <rect x="148" y="196" width="18" height="124" rx="1"/>
    <rect x="182" y="213" width="18" height="107" rx="1"/>
    <rect x="216" y="201" width="18" height="119" rx="1"/>
    <rect x="250" y="209" width="18" height="111" rx="1"/>
    <rect x="284" y="198" width="18" height="122" rx="1"/>
    <rect x="318" y="207" width="18" height="113" rx="1"/>
    <rect x="352" y="203" width="18" height="117" rx="1"/>
  </g>
  <polyline points="114,204 148,196 182,213 216,201 250,209 284,198 318,207 352,203" fill="none" stroke="#2ca6a4" stroke-width="2" stroke-linecap="round"/>

  <g fill="#e8763a" opacity="0.85">
    <rect x="514" y="300" width="18" height="20" rx="1"/>
    <rect x="548" y="292" width="18" height="28" rx="1"/>
    <rect x="582" y="95" width="18" height="225" rx="1"/>
    <rect x="616" y="304" width="18" height="16" rx="1"/>
    <rect x="650" y="283" width="18" height="37" rx="1"/>
    <rect x="684" y="118" width="18" height="202" rx="1"/>
    <rect x="718" y="299" width="18" height="21" rx="1"/>
    <rect x="752" y="307" width="18" height="13" rx="1"/>
  </g>
  <polyline points="514,300 548,292 582,95 616,304 650,283 684,118 718,299 752,307" fill="none" stroke="#e8763a" stroke-width="2" stroke-linecap="round"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#777" font-size="10">
    <text x="240" y="342" text-anchor="middle">protein index</text>
    <text x="640" y="342" text-anchor="middle">protein index</text>
    <text x="28" y="195" transform="rotate(-90,28,195)" text-anchor="middle">trait signal / weight</text>
    <text x="430" y="78" font-size="13" fill="#555" font-style="italic">pooling should match where the label signal lives</text>
  </g>
