<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Study schematic for genomic trait prediction">
  <rect width="880" height="420" fill="#ffffff"/>
  <g stroke="#eeeeee" stroke-width="0.7">
    <line x1="80" y1="370" x2="800" y2="370"/>
    <line x1="80" y1="300" x2="800" y2="300"/>
    <line x1="80" y1="230" x2="800" y2="230"/>
    <line x1="80" y1="160" x2="800" y2="160"/>
    <line x1="80" y1="90" x2="800" y2="90"/>
    <line x1="80" y1="50" x2="80" y2="370"/>
    <line x1="260" y1="50" x2="260" y2="370"/>
    <line x1="440" y1="50" x2="440" y2="370"/>
    <line x1="620" y1="50" x2="620" y2="370"/>
    <line x1="800" y1="50" x2="800" y2="370"/>
  </g>
  <text x="440" y="33" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#555" font-style="italic">only the genome pooling operator changes</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <text x="95" y="82" font-size="13" font-weight="600" fill="#333">NCBI genomes</text>
    <text x="95" y="101" font-size="11" fill="#888">BacDive labels</text>

    <path d="M210 92 C250 92, 270 118, 310 118" fill="none" stroke="#c4c4c4" stroke-width="1.3"/>
    <circle cx="210" cy="92" r="3.5" fill="#333"/>
    <circle cx="310" cy="118" r="3.5" fill="#333"/>

    <text x="325" y="123" font-size="13" font-weight="600" fill="#333">ORF prediction</text>
    <text x="325" y="142" font-size="11" fill="#888">p1, p2, ..., pP</text>

    <path d="M430 132 C465 148, 500 158, 535 176" fill="none" stroke="#c4c4c4" stroke-width="1.3"/>
    <circle cx="535" cy="176" r="3.5" fill="#333"/>

    <text x="548" y="181" font-size="13" font-weight="600" fill="#333">frozen ESM-2</text>
    <text x="548" y="200" font-size="11" fill="#888">protein vectors x1...xP</text>

    <path d="M620 198 C620 235, 535 240, 455 256" fill="none" stroke="#2ca6a4" stroke-width="2" stroke-linecap="round"/>
    <path d="M620 198 C650 228, 710 244, 760 256" fill="none" stroke="#e8763a" stroke-width="2" stroke-linecap="round"/>

    <circle cx="455" cy="256" r="4" fill="#2ca6a4" stroke="#fff" stroke-width="1"/>
    <text x="322" y="260" font-size="13" font-weight="600" fill="#2ca6a4">mean-pool</text>
    <text x="322" y="278" font-size="11" fill="#2ca6a4" opacity="0.75">xbar = mean(xi)</text>

    <circle cx="760" cy="256" r="4" fill="#e8763a" stroke="#fff" stroke-width="1"/>
    <text x="618" y="260" font-size="13" font-weight="600" fill="#e8763a">attention-pool</text>
    <text x="618" y="278" font-size="11" fill="#e8763a" opacity="0.75">z = sum ai xi</text>

    <path d="M455 270 C500 305, 550 310, 610 330" fill="none" stroke="#999" stroke-width="1.2"/>
    <path d="M760 270 C720 305, 675 314, 610 330" fill="none" stroke="#999" stroke-width="1.2"/>
    <circle cx="610" cy="330" r="4" fill="#333"/>
    <text x="625" y="334" font-size="13" font-weight="600" fill="#333">21 trait heads</text>
    <text x="625" y="353" font-size="11" fill="#888">species / genus / family held-out tests</text>

    <text x="95" y="356" font-size="11" fill="#999">fixed: data, encoder, heads, loss</text>
  </g>
</svg>
