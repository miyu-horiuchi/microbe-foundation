<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 390" role="img" aria-label="Pooling bias comparison">
  <rect width="880" height="390" fill="#ffffff"/>
  <g stroke="#eeeeee" stroke-width="0.7">
    <line x1="90" y1="320" x2="790" y2="320"/>
    <line x1="90" y1="245" x2="790" y2="245"/>
    <line x1="90" y1="170" x2="790" y2="170"/>
    <line x1="90" y1="95" x2="790" y2="95"/>
    <line x1="90" y1="60" x2="90" y2="320"/>
    <line x1="440" y1="60" x2="440" y2="320"/>
    <line x1="790" y1="60" x2="790" y2="320"/>
  </g>
  <line x1="90" y1="320" x2="390" y2="320" stroke="#c4c4c4"/>
  <line x1="90" y1="60" x2="90" y2="320" stroke="#c4c4c4"/>
  <line x1="490" y1="320" x2="790" y2="320" stroke="#c4c4c4"/>
